apiVersion: apps/v1
kind: Deployment
metadata:
  name: free-sales-forecast-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: free-sales-forecast-redis
  template:
    metadata:
      labels:
        app: free-sales-forecast-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: free-sales-forecast-redis
spec:
  selector:
    app: free-sales-forecast-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
