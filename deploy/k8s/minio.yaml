apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: free-sales-forecast-minio
spec:
  serviceName: free-sales-forecast-minio
  replicas: 1
  selector:
    matchLabels:
      app: free-sales-forecast-minio
  template:
    metadata:
      labels:
        app: free-sales-forecast-minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
          args:
            - server
            - /data
            - --console-address
            - :9001
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: free-sales-forecast-secret
                  key: S3_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: free-sales-forecast-secret
                  key: S3_SECRET_KEY
          ports:
            - containerPort: 9000
            - containerPort: 9001
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: free-sales-forecast-minio
spec:
  selector:
    app: free-sales-forecast-minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
