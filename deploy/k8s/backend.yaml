apiVersion: apps/v1
kind: Deployment
metadata:
  name: free-sales-forecast-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: free-sales-forecast-backend
  template:
    metadata:
      labels:
        app: free-sales-forecast-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/free-sales-forecast-backend:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: free-sales-forecast-config
            - secretRef:
                name: free-sales-forecast-secret
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: storage
              mountPath: /app/storage
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: free-sales-forecast-storage
---
apiVersion: v1
kind: Service
metadata:
  name: free-sales-forecast-backend
spec:
  selector:
    app: free-sales-forecast-backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: free-sales-forecast-storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
