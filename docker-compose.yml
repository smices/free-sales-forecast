name: free-sales-forecast

services:
  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.frontend
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      FRONTEND_API_BASE_URL: ${FRONTEND_API_BASE_URL:-}
      FRONTEND_DEFAULT_LOCALE: ${FRONTEND_DEFAULT_LOCALE:-auto}
      FRONTEND_AVATAR_SEED: ${FRONTEND_AVATAR_SEED:-open-forecast}
      FRONTEND_APP_DISPLAY_NAME: ${FRONTEND_APP_DISPLAY_NAME:-Free Sales Forecast}
    ports:
      - "8080:8080"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_ENV: ${APP_ENV:-local}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://forecast:forecast@postgres:5432/forecast}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      STORAGE_ROOT: ${STORAGE_ROOT:-/app/storage}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minio123}
      S3_BUCKET: ${S3_BUCKET:-free-sales-forecast}
      TASK_ALWAYS_EAGER: ${TASK_ALWAYS_EAGER:-false}
    volumes:
      - ./backend/app:/app/app
      - ./storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    command: dramatiq worker_app.tasks --processes 1 --threads 4
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - backend
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forecast}
      POSTGRES_USER: ${POSTGRES_USER:-forecast}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forecast}
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-forecast} -d $${POSTGRES_DB:-forecast}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
